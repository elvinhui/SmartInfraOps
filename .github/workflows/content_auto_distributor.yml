name: Content Auto Distributor (RSS -> Social Matrix)

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  distribute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale mesh
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify phone proxy connection
        env:
          PROXY_TAILSCALE_IP: ${{ secrets.PROXY_TAILSCALE_IP }}
          SOCKS_USER: ${{ secrets.SOCKS_USER }}
          SOCKS_PASS: ${{ secrets.SOCKS_PASS }}
        run: |
          echo "Testing SOCKS5 proxy via Tailscale..."
          PROXY="socks5h://${SOCKS_USER}:${SOCKS_PASS}@${PROXY_TAILSCALE_IP}:1080"
          EXIT_IP=$(curl -x "$PROXY" -s --connect-timeout 15 https://httpbin.org/ip | jq -r '.origin' || echo "FAILED")
          GHA_IP=$(curl -s https://httpbin.org/ip | jq -r '.origin')
          echo "Proxy exit IP: $EXIT_IP"
          echo "GHA native IP: $GHA_IP"
          if [ "$EXIT_IP" = "FAILED" ] || [ -z "$EXIT_IP" ]; then
            echo "::warning::Phone proxy unreachable. Falling back to direct connection."
            echo "PROXY_AVAILABLE=false" >> $GITHUB_ENV
          else
            echo "✅ Phone proxy verified! Traffic will exit via residential/mobile IP."
            echo "PROXY_AVAILABLE=true" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            xdotool \
            xclip \
            xsel \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libxkbcommon0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r module_distributor/requirements.txt
          python -m playwright install chromium --with-deps

      - name: Decode Medium Auth JSON
        env:
          MEDIUM_AUTH_JSON_BASE64: ${{ secrets.MEDIUM_AUTH_JSON_BASE64 }}
        run: |
          if [ -n "$MEDIUM_AUTH_JSON_BASE64" ]; then
            echo "$MEDIUM_AUTH_JSON_BASE64" | base64 -d > module_distributor/medium_auth.json
            echo "medium_auth.json written."
          else
            echo "Warning: MEDIUM_AUTH_JSON_BASE64 not set."
          fi

      - name: Decode X (Twitter) Auth JSON
        env:
          X_AUTH_JSON_BASE64: ${{ secrets.X_AUTH_JSON_BASE64 }}
        run: |
          if [ -n "$X_AUTH_JSON_BASE64" ]; then
            echo "$X_AUTH_JSON_BASE64" | base64 -d > module_distributor/x_auth.json
            echo "x_auth.json written."
          else
            echo "Warning: X_AUTH_JSON_BASE64 not set."
          fi

      - name: Run Orchestrator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PROXY_SERVER: ${{ env.PROXY_AVAILABLE == 'true' && format('socks5://{0}:{1}@{2}:1080', secrets.SOCKS_USER, secrets.SOCKS_PASS, secrets.PROXY_TAILSCALE_IP) || '' }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x800x24 &
          sleep 2
          cd module_distributor
          python orchestrator.py

      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: module_distributor/*.png
          retention-days: 5
