name: Content Auto Distributor (RSS -> Social Matrix)

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  distribute:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push posted_urls.txt back to repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r module_distributor/requirements.txt
          playwright install chromium

      - name: Decode Medium Auth JSON
        env:
          MEDIUM_AUTH_JSON_BASE64: ${{ secrets.MEDIUM_AUTH_JSON_BASE64 }}
        run: |
          if [ -n "$MEDIUM_AUTH_JSON_BASE64" ]; then
            echo "$MEDIUM_AUTH_JSON_BASE64" | base64 --decode > module_distributor/medium_auth.json
          else
            echo "Warning: MEDIUM_AUTH_JSON_BASE64 secret is not set."
          fi

      - name: Decode Twitter Auth JSON
        env:
          TWITTER_AUTH_JSON_BASE64: ${{ secrets.TWITTER_AUTH_JSON_BASE64 }}
        run: |
          if [ -n "$TWITTER_AUTH_JSON_BASE64" ]; then
            echo "$TWITTER_AUTH_JSON_BASE64" | base64 --decode > module_distributor/twitter_auth.json
          else
            echo "Warning: TWITTER_AUTH_JSON_BASE64 secret is not set."
          fi

      - name: Setup Gost Proxy Tunnel
        env:
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
        run: |
          wget https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gzip -d gost-linux-amd64-2.11.5.gz
          mv gost-linux-amd64-2.11.5 gost
          chmod +x gost
          # Start gost bridging local 8080 to the remote residential proxy
          ./gost -L=:8080 -F=http://${PROXY_USER}:${PROXY_PASS}@${PROXY_HOST#*://} &
          sleep 2
          # Test connectivity
          curl -s -x http://127.0.0.1:8080 http://ip-api.com/json || echo "Proxy test failed"

      - name: Run Orchestrator
        env:
          X_PHASE: '1'
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          cd module_distributor
          python orchestrator.py

      - name: Commit posted URLs
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add module_distributor/posted_urls.txt
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update posted_urls.txt [skip ci]" && git push)
