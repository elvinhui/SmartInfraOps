name: Content Auto Distributor (RSS -> Social Matrix)

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  distribute:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push posted_urls.txt back to repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r module_distributor/requirements.txt
          playwright install chromium

      - name: Decode Medium Auth JSON
        env:
          MEDIUM_AUTH_JSON_BASE64: ${{ secrets.MEDIUM_AUTH_JSON_BASE64 }}
        run: |
          if [ -n "$MEDIUM_AUTH_JSON_BASE64" ]; then
            echo "$MEDIUM_AUTH_JSON_BASE64" | base64 --decode > module_distributor/medium_auth.json
          else
            echo "Warning: MEDIUM_AUTH_JSON_BASE64 secret is not set."
          fi

      - name: Run Orchestrator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          cd module_distributor
          python orchestrator.py

      - name: Commit posted URLs
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add module_distributor/posted_urls.txt
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update posted_urls.txt [skip ci]" && git push)
