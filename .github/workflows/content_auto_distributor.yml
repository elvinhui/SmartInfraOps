name: Content Auto Distributor (RSS -> Social Matrix)

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  distribute:
    runs-on: self-hosted
    permissions:
      contents: write # Needed to push posted_urls.txt back to repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Install dependencies
        run: |
          py -m pip install --upgrade pip
          py -m pip install -r module_distributor/requirements.txt

      - name: Decode Medium Auth JSON
        env:
          MEDIUM_AUTH_JSON_BASE64: ${{ secrets.MEDIUM_AUTH_JSON_BASE64 }}
        run: |
          if (![string]::IsNullOrEmpty($env:MEDIUM_AUTH_JSON_BASE64)) {
            [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($env:MEDIUM_AUTH_JSON_BASE64)) | Out-File -FilePath "module_distributor/medium_auth.json" -Encoding utf8 -NoNewline
          } else {
            Write-Output "Warning: MEDIUM_AUTH_JSON_BASE64 secret is not set."
          }


      - name: Run Orchestrator
        env:
          X_PHASE: '1'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          cd module_distributor
          py orchestrator.py

      - name: Commit posted URLs
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add module_distributor/posted_urls.txt
          if (git status --porcelain module_distributor/posted_urls.txt) {
            git commit -m "chore: update posted URLs [skip ci]"
            git push
          } else {
            Write-Output "No changes to commit"
          }
