name: Analytics Morning Report (Umami -> Meta WA)

on:
  schedule:
    # Runs at 08:00 AM UTC+8 (which is 00:00 UTC) every day
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r module_analytics/requirements.txt

      - name: Run Analytics Engine
        env:
          UMAMI_URL: ${{ secrets.UMAMI_URL }}
          UMAMI_USERNAME: ${{ secrets.UMAMI_USERNAME }}
          UMAMI_PASSWORD: ${{ secrets.UMAMI_PASSWORD }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
          META_WA_TOKEN: ${{ secrets.META_WA_TOKEN }}
          WA_PHONE_ID: ${{ secrets.WA_PHONE_ID }}
          MY_PHONE_NUMBER: ${{ secrets.MY_PHONE_NUMBER }}
        run: python module_analytics/main.py
