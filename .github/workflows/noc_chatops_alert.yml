name: NOC ChatOps Alert Engine

on:
  push:
  schedule:
    # Runs at 08:00 AM UTC+8 (which is 00:00 UTC) every day
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r module_noc_alerts/requirements.txt

      - name: Run NOC Alert Engine
        env:
          UMAMI_URL: ${{ secrets.UMAMI_URL }}
          UMAMI_USERNAME: ${{ secrets.UMAMI_USERNAME }}
          UMAMI_PASSWORD: ${{ secrets.UMAMI_PASSWORD }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
          NOC_WEBHOOK_URL: ${{ secrets.NOC_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python module_noc_alerts/main.py
