name: Windows Self-Hosted Test

on:
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发

jobs:
  test-windows-runner:
    runs-on: self-hosted # 这里指定使用你的本地 runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test Windows PowerShell
        run: |
          Write-Host "Hello from Windows Self-Hosted Runner!"
          Write-Host "当前执行路径: $PWD"
          Get-ChildItem # 相当于 ls 或 dir，列出当前目录文件
