name: Medium API Probe (one-time test)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Medium API Probe
        env:
          MEDIUM_SID: ${{ secrets.MEDIUM_SID }}
          MEDIUM_UID: ${{ secrets.MEDIUM_UID }}
        run: python module_pusher/probe_medium.py
