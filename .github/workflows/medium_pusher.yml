name: Medium Auto Pusher

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: 'medium-pusher'
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r module_pusher/requirements.txt
          playwright install chromium

      - name: Prepare Medium Auth State
        # The secret MEDIUM_AUTH_JSON should contain the JSON string of playwright state
        run: |
          echo '${{ secrets.MEDIUM_AUTH_JSON }}' > medium_auth.json

      - name: Run Pusher Engine
        env:
          RSS_URL: 'https://smartinfralog.com/index.xml'
          MEDIUM_AUTH_JSON_FILE: 'medium_auth.json'
        run: python module_pusher/main.py

      - name: Clean up Auth State
        if: always()
        run: rm -f medium_auth.json

      - name: Commit posted URLs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add module_pusher/posted_urls.txt
          
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(pusher): update posted URLs [skip ci]"
            git push
          else
            echo "No new URLs to commit."
          fi
