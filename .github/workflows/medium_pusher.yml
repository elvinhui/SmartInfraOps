name: Medium Auto Pusher

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: 'medium-pusher'
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Pusher Engine
        env:
          RSS_URL: 'https://smartinfralog.com/index.xml'
          MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
        run: python module_pusher/main.py

      - name: Commit posted URLs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add module_pusher/posted_urls.txt
          
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(pusher): update posted URLs [skip ci]"
            git push
          else
            echo "No new URLs to commit."
          fi
